name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - use: actions/checkout@v3

      - use: actions/setup-node@v3
        with:
          node-version: '22'
      
      - run: npm install

      - run: npm run lint

      - run: npm run test

      - run: npm run test:e2e

      - run: npm run build 